{% extends "base.html" %}
{% load static %}

{% block title %}JobFlex — Вход{% endblock %}

{% block content %}
<main class="container container--wide">
    <section class="auth u-flex-center">
        <form id="login-form" class="auth-form u-max-w-480" onsubmit="return false;">
            <h2>Вход в аккаунт</h2>
            <div id="login-error" class="auth-error"></div>
            <div class="field">
                <label>Логин</label>
                <input type="text" name="username" id="username" autocomplete="username" placeholder="Ваш логин">
            </div>
            <div class="field">
                <label>Пароль</label>
                <input type="password" name="password" id="password" autocomplete="current-password" placeholder="Введите пароль">
            </div>
            <div class="field actions">
                <button type="submit" class="btn-primary">Войти</button>
                <button type="button" id="to-register" class="btn">Регистрация</button>
            </div>
        </form>
    </section>
</main>
{% endblock %}

{% block extra_scripts %}
<script src="{% static 'vacancies/js/custom-select.js' %}"></script>
<script>
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

function showError(msg) {
    var el = document.getElementById('login-error');
    el.textContent = msg;
    el.style.display = 'block';
}

document.getElementById('login-form').addEventListener('submit', function(e){
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) { showError('Заполните логин и пароль.'); return; }
    const csrftoken = getCookie('csrftoken');
    fetch('{% url "accounts:api_login" %}', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrftoken, 'Accept': 'application/json' },
        body: JSON.stringify({username, password})
    }).then(r => r.json()).then(d => {
        if (d.ok) window.location = d.redirect_to || '/';
        else if (d.error === 'invalid_credentials') showError('Неверный логин или пароль.');
        else showError('Ошибка входа.');
    }).catch(()=> showError('Ошибка сети.'));
});

document.getElementById('to-register').addEventListener('click', function(){
    window.location.href = '{% url "accounts:register" %}';
});
</script>
{% endblock %}
