stages:
  - validate
  - build
  - test
  - security

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .venv/

# ─── СТЕЙДЖ 1: ЛИНТЕР ───────────────────────────────────────────────
lint:
  stage: validate
  image: python:3.11-slim
  before_script:
    - pip install flake8 flake8-html --quiet
  script:
    - mkdir -p reports/lint
    - flake8 . --max-line-length=120
        --exclude=.venv,__pycache__,migrations,settings.py
        --format=html --htmldir=reports/lint
        || true
    - flake8 . --max-line-length=120
        --exclude=.venv,__pycache__,migrations,settings.py
        || true
  artifacts:
    name: "lint-report-${CI_COMMIT_SHORT_SHA}"
    when: always
    expire_in: 7 days
    paths:
      - reports/lint/

# ─── СТЕЙДЖ 2: СБОРКА ───────────────────────────────────────────────
build:
  stage: build
  image: python:3.11-slim
  before_script:
    - python -m venv .venv
    - source .venv/bin/activate
  script:
    - pip install --upgrade pip --quiet
    - pip install -r requirements.txt --quiet
    - pip install -r requirements-dev.txt --quiet
    - python manage.py check
  artifacts:
    paths:
      - .venv/
    expire_in: 1 hour

# ─── СТЕЙДЖ 3: ТЕСТЫ ────────────────────────────────────────────────
test:
  stage: test
  allow_failure: true 
  image: python:3.11-slim
  variables:
    DJANGO_SETTINGS_MODULE: config.settings
  before_script:
    - source .venv/bin/activate
  script:
    - mkdir -p reports/coverage
    - pytest --cov=. --cov-report=html:reports/coverage
        --cov-report=term
        --cov-report=xml:reports/coverage/coverage.xml
        -v
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    name: "coverage-report-${CI_COMMIT_SHORT_SHA}"
    when: always
    expire_in: 7 days
    paths:
      - reports/coverage/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: reports/coverage/coverage.xml

# ─── СТЕЙДЖ 4: БЕЗОПАСНОСТЬ ─────────────────────────────────────────
security_scan:
  stage: security
  image: python:3.11-slim
  before_script:
    - pip install bandit --quiet
  script:
    - mkdir -p reports/security
    - bandit -r . --exclude .venv,migrations
        -f html -o reports/security/bandit-report.html
        --severity-level medium
        || true
    - bandit -r . --exclude .venv,migrations
        --severity-level medium
        || true
  artifacts:
    name: "security-report-${CI_COMMIT_SHORT_SHA}"
    when: always
    expire_in: 7 days
    paths:
      - reports/security/